org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
kotlin.code.style=official

# ABIs to cross-compile the Rust engine for, comma-separated. Override on the
# command line (e.g. -Pandroid.abis=arm64-v8a) to speed up local debug builds.
# Maps to cargo-ndk -t flags; see app/build.gradle.kts.
android.abis=arm64-v8a,armeabi-v7a,x86_64
